name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      run_type:
        description: "Execution type (ci, scheduled, manual)"
        required: false
        type: string
        default: "ci"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Git
        run: git config --global init.defaultBranch main && git config --global advice.detachedHead false

      - name: Verify Environment Variables
        run: |
          echo "Checking configured environment variables..."
          echo "SUPABASE_URL: ${SUPABASE_URL:+configured}"
          echo "SUPABASE_KEY: ${SUPABASE_KEY:+configured}"
          echo "NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:+configured}"
          echo "NEXT_PUBLIC_SUPABASE_KEY: ${NEXT_PUBLIC_SUPABASE_KEY:+configured}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}

      - name: Debug test results
        if: always()
        run: |
          pwd
          ls
          ls test-results || true

      - name: Parse test results
        if: always()
        id: test-results
        run: node scripts/parse-test-results.js > test-summary.json && cat test-summary.json

      - name: Create GitHub Actions Job Summary
        if: always()
        run: |
          if [ ! -f test-summary.json ]; then
            echo "⚠️ No test summary found" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          SUMMARY=$(cat test-summary.json)
          PASSED=$(echo "$SUMMARY" | jq -r '.passed // 0')
          FAILED=$(echo "$SUMMARY" | jq -r '.failed // 0')
          SKIPPED=$(echo "$SUMMARY" | jq -r '.skipped // 0')
          DURATION=$(echo "$SUMMARY" | jq -r '.duration // 0')

          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## ✅ Playwright Test Results

          | Metric | Value |
          |--------|-------|
          | **Passed** | $PASSED |
          | **Failed** | $FAILED |
          | **Skipped** | $SKIPPED |
          | **Duration** | ${DURATION}s |

          ### 📦 HTML Report
          **Download the artifact** \`playwright-report-${{ github.run_id }}\` from the **Artifacts** section below to view the interactive HTML report.

          Steps to view:
          1. Click **Artifacts** section (bottom of workflow summary)
          2. Download \`playwright-report-${{ github.run_id }}.zip\`
          3. Extract the ZIP file
          4. Open \`playwright-report/index.html\` in your browser

          **Retention**: 30 days

          EOF

      - name: Upload Playwright report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Publish Unit Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/junit.xml
          check_name: Playwright Test Results

      - name: Comment on Pull Request
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('test-summary.json', 'utf-8'));

            const body = `## ✅ Playwright Test Report

            **Test Summary:**
            - ✅ Passed: ${summary.passed}
            - ❌ Failed: ${summary.failed}
            - ⏭️ Skipped: ${summary.skipped}
            - ⏱️ Duration: ${summary.duration}s

            **📋 Links:**
            - [HTML Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [GitHub Actions Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ---
            *Generated by Playwright Test Runner*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => comment.user.type === 'Bot' && comment.body.includes('Playwright Test Report'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Upload test results to Supabase
        if: always()
        run: npm run upload:test-results
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          RUN_TYPE: ${{ inputs.run_type }}

