name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      run_type:
        description: "Execution type (ci, scheduled, manual)"
        required: false
        type: string
        default: "ci"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Git
        run: git config --global init.defaultBranch main && git config --global advice.detachedHead false

      - name: Verify Environment Variables
        run: |
          echo "Checking configured environment variables..."
          echo "SUPABASE_URL: ${SUPABASE_URL:+configured}"
          echo "SUPABASE_KEY: ${SUPABASE_KEY:+configured}"
          echo "NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:+configured}"
          echo "NEXT_PUBLIC_SUPABASE_KEY: ${NEXT_PUBLIC_SUPABASE_KEY:+configured}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}

      - name: Debug test results
        if: always()
        run: |
          pwd
          ls
          ls test-results || true

      - name: Parse test results
        if: always()
        id: test-results
        run: node scripts/parse-test-results.js > test-summary.json && cat test-summary.json

      - name: Upload Playwright report as artifact
        if: always()
        id: artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn
          compression-level: 0

      - name: Get artifact download URL
        if: always()
        id: artifact-url
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'playwright-report-${{ github.run_id }}'
            });

            if (artifacts.data.artifacts.length > 0) {
              const artifact = artifacts.data.artifacts[0];
              core.setOutput('artifact-id', artifact.id);
              core.setOutput('artifact-url', `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${artifact.id}`);
            }

      - name: Publish Unit Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/junit.xml
          check_name: Playwright Test Results

      - name: Comment on Pull Request
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.artifact-url.outputs.artifact-url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('test-summary.json', 'utf-8'));

            const statusEmoji = summary.failed > 0 ? '❌' : '✅';
            const artifactUrl = process.env.ARTIFACT_URL || `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts`;

            const body = [
              `## ${statusEmoji} Playwright Test Results`,
              '',
              '#### Test Summary',
              `- **✅ Passed:** ${summary.passed}`,
              `- **❌ Failed:** ${summary.failed}`,
              `- **⏭️ Skipped:** ${summary.skipped}`,
              `- **⏱️ Duration:** ${summary.duration}s`,
              '',
              '#### 📄 Full Report',
              `[**📥 Download Artifact** \`playwright-report-${{ github.run_id }}\`](${artifactUrl})`,
              '',
              'Extract the ZIP and open `playwright-report/index.html` in your browser to view the complete interactive report with test details, screenshots, videos, and traces.',
              '',
              '---',
              '*Playwright Test Runner*'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => comment.user.type === 'Bot' && comment.body.includes('Playwright Test Report'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Upload test results to Supabase
        if: always()
        run: npm run upload:test-results
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          RUN_TYPE: ${{ inputs.run_type }}

